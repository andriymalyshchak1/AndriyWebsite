<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>?</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/styles.css" />

  <!-- Start invisible to enable smooth fade-in on arrival -->
  <style>body { opacity: 0; }</style>
  <script>document.documentElement.classList.add('js');</script>
</head>
<body class="secret-body">

  <div class="secret-content">

    <p class="secret-prompt">What's my birthday?</p>

    <div class="secret-input-group" id="input-group">
      <input
        type="text"
        inputmode="numeric"
        maxlength="2"
        placeholder="MM"
        class="secret-input secret-input--month"
        id="mm"
        autocomplete="off"
      />
      <span class="secret-sep" aria-hidden="true">/</span>
      <input
        type="text"
        inputmode="numeric"
        maxlength="2"
        placeholder="DD"
        class="secret-input secret-input--day"
        id="dd"
        autocomplete="off"
      />
      <span class="secret-sep" aria-hidden="true">/</span>
      <input
        type="text"
        inputmode="numeric"
        maxlength="4"
        placeholder="YYYY"
        class="secret-input secret-input--year"
        id="yyyy"
        autocomplete="off"
      />
    </div>

    <p class="secret-error" id="secret-error" aria-live="polite">
      not quite... get to know me
    </p>

  </div>

  <script>
    // Fade body in on arrival from index.html
    (function () {
      document.body.style.transition = 'opacity 400ms ease';
      document.body.style.opacity = '1';
    }());
  </script>

  <script>
    (function () {
      'use strict';

      var mm    = document.getElementById('mm');
      var dd    = document.getElementById('dd');
      var yyyy  = document.getElementById('yyyy');
      var error = document.getElementById('secret-error');
      var content = document.querySelector('.secret-content');

      // ── Fade-in on load ──
      if ('IntersectionObserver' in window) {
        var observer = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) {
              content.classList.add('is-visible');
              observer.unobserve(content);
            }
          });
        }, { threshold: 0.01 });
        observer.observe(content);
      } else {
        content.classList.add('is-visible');
      }

      // ── Digit-only filter ──
      function digitsOnly(val) {
        return val.replace(/\D/g, '');
      }

      // ── Check answer ──
      function checkAnswer() {
        if (mm.value === '09' && dd.value === '04' && yyyy.value === '2004') {
          window.location.href = 'inner.html';
        } else {
          showError();
        }
      }

      // ── Error fade: out then in if already showing ──
      var errorShown = false;
      function showError() {
        if (errorShown) {
          error.classList.remove('secret-error--visible');
          setTimeout(function () {
            error.classList.add('secret-error--visible');
          }, 320);
        } else {
          error.classList.add('secret-error--visible');
          errorShown = true;
        }
      }

      // ── MM input ──
      mm.addEventListener('input', function () {
        this.value = digitsOnly(this.value);
        if (this.value.length === 2) dd.focus();
      });

      mm.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') checkAnswer();
      });

      // ── DD input ──
      dd.addEventListener('input', function () {
        this.value = digitsOnly(this.value);
        if (this.value.length === 2) yyyy.focus();
      });

      dd.addEventListener('keydown', function (e) {
        if (e.key === 'Backspace' && this.value === '') mm.focus();
        if (e.key === 'Enter') checkAnswer();
      });

      // ── YYYY input ──
      yyyy.addEventListener('input', function () {
        this.value = digitsOnly(this.value);
        if (this.value.length === 4) checkAnswer();
      });

      yyyy.addEventListener('keydown', function (e) {
        if (e.key === 'Backspace' && this.value === '') dd.focus();
        if (e.key === 'Enter') checkAnswer();
      });

      // ── Focus first field on load ──
      mm.focus();

    }());
  </script>
</body>
</html>

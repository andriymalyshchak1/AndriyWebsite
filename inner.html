<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>—</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/styles.css" />

  <!-- Start invisible — fades in on load, consistent with all pages -->
  <style>body { opacity: 0; }</style>
  <script>document.documentElement.classList.add('js');</script>
</head>
<body>
  <main class="page article-page">
    <div class="inner-content">

      <a href="index.html" class="back-link">← andriymal.com</a>

      <p class="inner-message">gimme a min</p>

    </div>
  </main>

  <script src="js/main.js"></script>
  <script>
    /* Fade body in */
    document.body.style.transition = 'opacity 400ms ease';
    document.body.style.opacity = '1';

    /* Fade content in — same IntersectionObserver pattern as article.html */
    (function () {
      var el = document.querySelector('.inner-content');
      if (!el) return;
      if ('IntersectionObserver' in window) {
        var observer = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) {
              el.classList.add('is-visible');
              observer.unobserve(el);
            }
          });
        }, { threshold: 0.01 });
        observer.observe(el);
      } else {
        el.classList.add('is-visible');
      }
    }());
  </script>
</body>
</html>
